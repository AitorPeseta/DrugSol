name: drugsol-train
channels:
  - pytorch
  - nvidia
  - conda-forge
channel_priority: strict
dependencies:
  - python=3.11
  # --- Core GPU Stack ---
  - pytorch=2.5.*
  - pytorch-cuda=12.4
  - pytorch-lightning
  
  # --- Data & Math ---
  - numpy>=1.26
  - pandas
  - pyarrow
  
  # --- Bio/Cheminformatics ---
  - rdkit=2023.09.*
  
  # --- ML Libraries ---
  - optuna                # Para optimización de hiperparámetros
  - shap                  # Para explicabilidad
  - pip
  - pip:
      - chemprop>=2.0     # Chemprop v2
      - xgboost
      - lightgbm
      - scikit-learn      # Necesario para métricas y regresión lineal