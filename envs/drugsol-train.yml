name: drugsol-train
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.8
  - pytorch=1.13.*
  - pytorch-cuda=11.7
  - numpy<1.24
  - pandas<2.0.0
  - rdkit=2022.09.5
  - pyarrow
  - shap
  - mkl
  - mkl-service
  - matplotlib
  - seaborn
  - scipy
  - py-xgboost-gpu   # Versión específica con soporte GPU activado
  - lightgbm         # En conda-forge suele venir con soporte OpenCL/CUDA
  - pip
  - pip:
      - chemprop==1.6.1
      - optuna
      - scikit-learn