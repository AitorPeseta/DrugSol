name: ml-gpu
channels:
  - conda-forge        # RDKit aquí
  - pytorch            # PyTorch oficial
  - nvidia             # Metapaquete CUDA para PyTorch
channel_priority: strict
dependencies:
  - python=3.11
  # PyTorch + CUDA (elige la serie que tengan disponible en tus canales)
  - pytorch=2.5.*              # del canal pytorch
  - pytorch-cuda=12.4          # del canal nvidia (empaqueta las DLL/so necesarias)
  # Ciencia de datos
  - rdkit=2023.09.*
  - numpy
  - pandas
  - scikit-learn=1.4.*
  - matplotlib
  - pyarrow
  - optuna
  - mlflow
  - shap
  # Lightning: Chemprop v2 usa Lightning; evita versiones muy antiguas
  - pytorch-lightning>=2.0,<2.6
  - lightning-utilities<0.10
  - pip
  - pip:
      - chemprop>=2.0.3,<3
      - sympy==1.12.*
      - xgboost==2.1.*
      - lightgbm==4.5.*
